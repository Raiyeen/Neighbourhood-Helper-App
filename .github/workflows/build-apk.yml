name: Build Android APK

on:
  push:
    branches:
      - main # Trigger on push to main branch

jobs:
  build-android:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Setup Java SDK
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Sync Capacitor
        run: |
          # Create a dummy out directory since we are wrapping a web URL
          mkdir -p out
          echo "<html><body>Loading App...</body></html>" > out/index.html
          # Sync capacitor android project
          npx cap sync android

      - name: Generate Android Assets (Icons & Splash)
        run: |
          npm i -g @capacitor/assets
          npx capacitor-assets generate --android

      - name: Build Android APK
        working-directory: ./android
        run: |
          chmod +x ./gradlew
          ./gradlew assembleDebug

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug.apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7
